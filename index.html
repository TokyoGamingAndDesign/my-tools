<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <title>My Tools</title>
    <style type="text/css">
/* Search container (optional wrapper) */
.search-container {
  display: inline-flex;
  align-items: center;
  margin-bottom: 1rem;
}

/* Input */
#searchBox {
  padding: 0.45rem 0.65rem;
  font-size: 0.95rem;
  border: 1px solid #bbb;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#searchBox:focus {
  border-color: #666;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
}

/* Button */
#searchBtn {
  padding: 0.45rem 0.9rem;
  font-size: 0.95rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: green;
  color: white;
  transition: background 0.2s, transform 0.1s;
}

#searchBtn:hover {
  background: #000;
}

#searchBtn:active {
  transform: translateY(1px);
}

/* Highlight */
.highlight {
  background-color: #ffeb3b;
  color: inherit;
  padding: 0.05em 0.15em;
  border-radius: 3px;
}

#ID1 {
  font-size: 24pt;
  font-family: "Calibri", "Tahoma", "Arial";
}

#ID2 {
  font-size: 20pt;
  font-family: "Calibri", "Tahoma", "Arial";
}
      
#ID3 {
  font-size: 16pt;
  font-family: "Calibri", "Tahoma", "Arial";
}
      
#ID4 {
  color: green;
  text-shadow: 2px 2px 2px black;
  font-size: 32pt;
  font-family: "Calibri", "Tahoma", "Arial";
}

#ID5 {
  font-size: 12pt;
  font-family: "Calibri", "Tahoma", "Arial";
}

      
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: beige;
}

li {
  float: left;
}

li a {
  display: block;
  color: black;
  text-align: center;
  padding: 8px 16px;
  text-decoration: none;
}

li a:hover {
  color: #F5F5F5;
  background-color: darkblue;
}
      
</style> </head>
  <body id="ID2">
    <p id="ID1">My Tools</p>
    <p>Tool 1</p>
    <p>Tool 2</p>
    <p>Tool 3</p>
    <p>Tool 4</p>
  </body>
</html>
